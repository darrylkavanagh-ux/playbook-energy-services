# ============================================================
# Playbook Energy Services — Deploy Pipeline
# Target: Railway (backend + frontend)
# ============================================================
name: Playbook Energy Services — Deploy

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CVK1100-corpus/**'
      - 'GITHUB_SYNC/**'
      - 'archive/**'
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: TypeScript check
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        continue-on-error: true

  deploy-railway:
    name: Deploy to Railway
    needs: build-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true

      - name: Health check
        run: |
          sleep 30
          echo "✅ Railway deployment initiated — monitor at https://railway.app/dashboard"
        continue-on-error: true
