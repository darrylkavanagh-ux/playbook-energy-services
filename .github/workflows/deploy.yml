# ============================================================
# Foxlite Energy Services — CI/CD
# PRIORITY DEPLOYMENT — First revenue platform
# ============================================================
name: Foxlite Energy Services — Build, Test & Deploy

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CVK1100-corpus/**'
      - 'GITHUB_SYNC/**'
      - 'archive/**'
      - 'ACTOR_FILES/**'
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Run tests
        run: pnpm test
      - name: Build
        run: pnpm run build
      - name: Audit
        run: pnpm audit --audit-level=high

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run build
        env:
          VITE_API_URL: ${{ secrets.FOXLITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: foxlite-services
          directory: dist/
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify deployment
        run: |
          sleep 30
          curl -f https://app.foxliteservices.com || exit 1

  deploy-backend:
    name: Deploy Backend to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        uses: railway/deploy-action@v1
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
          service: foxlite-backend