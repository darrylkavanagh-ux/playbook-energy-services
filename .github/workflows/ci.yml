name: CI — Playbook Corporation

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CVK1100-corpus/**'
      - 'GITHUB_SYNC/**'
      - 'archive/**'
      - 'ACTOR_FILES/**'
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  NODE_VERSION: '20.x'

jobs:
  type-check:
    name: TypeScript — Compile & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: TypeScript compile check
        run: npx tsc --noEmit
        continue-on-error: true

  security-scan:
    name: Security — Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  v10-compliance:
    name: VeriTech-10 — Process Recording Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check V10 recorder import in engine files
        run: |
          missing=0
          for f in $(find . -name "*.ts" -path "*/engines/*" -not -path "*/node_modules/*" 2>/dev/null); do
            if ! grep -q "withV10Record\|processRecorder" "$f" 2>/dev/null; then
              echo "::warning::Missing V10 recording: $f"
              missing=$((missing + 1))
            fi
          done
          echo "V10 compliance: $missing gaps (non-blocking)"
        continue-on-error: true

  build:
    name: Build — Production
    runs-on: ubuntu-latest
    needs: [ type-check ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Build
        run: npm run build
        continue-on-error: true
        env:
          NODE_ENV: production
